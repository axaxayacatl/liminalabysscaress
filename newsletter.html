<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAC Newsletter</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1330, #0b0914);
  color: #e6dcff;
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  backdrop-filter: blur(12px);
  background: rgba(20, 12, 40, 0.6);
  padding: 40px 20px;
  border-radius: 28px;
  border: 1px solid rgba(200,180,255,0.2);
  width: 320px;
}

h1 {
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 12px;
  margin: 0 0 24px 0;
}

p.definition {
  font-size: 10px;
  opacity: 0.45;
  line-height: 1.6;
  margin-bottom: 28px;
}

p.definition span {
  display: block;
  margin: 2px 0;
}

form {
  margin-top: 16px;
}

label {
  display:block;
  font-size:10px;
  letter-spacing:1px;
  opacity:0.6;
  color:#cfc1ff;
  margin-bottom:6px;
}

input[type="email"] {
  background: rgba(200,180,255,0.05);
  border: 1px solid rgba(200,180,255,0.3);
  color: #e6dcff;
  padding: 8px 12px;
  border-radius: 20px;
  font-size:10px;
  outline:none;
  width:180px;
  backdrop-filter: blur(12px);
}

input[type="submit"] {
  margin-left:8px;
  background: rgba(200,180,255,0.05);
  border: 1px solid rgba(200,180,255,0.3);
  color: #cfc1ff;
  padding:8px 12px;
  border-radius:20px;
  font-size:10px;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter: blur(12px);
}

input[type="submit"]:hover {
  background: rgba(200,180,255,0.2);
  color: #fff;
}

p.notice {
  font-size:8px;
  opacity:0.3;
  margin-top:6px;
}
p.notice a {
  color:#cfc1ff; 
  text-decoration:none; 
  opacity:0.5;
  transition:0.3s;
}
p.notice a:hover {
  opacity:0.9;
}
</style>
</head>
<body>

<div class="container">
  <h1>LAC</h1>

  <p class="definition">
    <span>liminal → in-between / digital / soft space</span>
    <span>abyss → depth / danger / demonic undertone</span>
    <span>caress → intimacy / lingerie / softness</span>
  </p>

  <form id="lac-form">
    <label for="email">access key → email</label>
    <input type="email" id="email" placeholder="your email here" required>
    <input type="submit" value="initiate">
    <p class="notice">
      your email will be added to the ritual list <br>
      <a href="https://buttondown.com/refer/liminalabysscaress" target="_blank">powered by Buttondown</a>
    </p>
  </form>
</div>

<script>
const form = document.getElementById('lac-form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) return alert('enter your email');

  try {
    await fetch('https://api.github.com/repos/axaxayacatl/liminalabysscaress/dispatches', {
      method: 'POST',
      headers: {
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        event_type: 'subscribe_email',
        client_payload: { email }
      })
    });

    alert('initiated ritual — email recorded');
    form.reset();
  } catch (err) {
    console.error(err);
    alert('ritual failed — see console');
  }
});
</script>

</body>
</html>
